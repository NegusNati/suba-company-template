name: suba-platform

services:
  suba-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - suba_db_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  suba-api:
    build:
      context: .
      dockerfile: Dockerfile.server
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: ${SERVER_PORT:-3000}
    depends_on:
      suba-db:
        condition: service_healthy
    volumes:
      - suba_uploads:/app/apps/server/uploads
    expose:
      - "${SERVER_PORT:-3000}"
    restart: unless-stopped
    networks:
      - internal
      - proxy
    healthcheck:
      test:
        [
          "CMD",
          "bun",
          "-e",
          "fetch('http://127.0.0.1:' + (process.env.PORT || '3000') + '/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  suba-web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_SERVER_URL: ${VITE_SERVER_URL}
        VITE_SITE_URL: ${VITE_SITE_URL}
        VITE_FRONTEND_URL: ${VITE_FRONTEND_URL:-}
    depends_on:
      - suba-api
    expose:
      - "80"
    restart: unless-stopped
    networks:
      - proxy
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3

networks:
  internal:
    driver: bridge
  proxy:
    external: true
    name: ${PROXY_NETWORK:-passport-frontend_web}

volumes:
  suba_db_data:
  suba_uploads:
