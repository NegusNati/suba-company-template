name: suba-platform

services:
  postgres:
    image: postgres:16-alpine
    container_name: suba-platform-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-suba_app}
      POSTGRES_USER: ${POSTGRES_USER:-suba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suba_password}
    ports:
      - "5432:5432"
    volumes:
      - suba-platform_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U suba -d suba_app"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  suba-platform_postgres_data:
