server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Define bot user agents for SSR
    # Social media crawlers and search engines that need pre-rendered HTML
    set $is_crawler 0;
    if ($http_user_agent ~* "(facebookexternalhit|Facebot|Twitterbot|TwitterCard|LinkedInBot|Pinterest|Slackbot|TelegramBot|WhatsApp|Discordbot|Googlebot|bingbot|yandex|baiduspider|DuckDuckBot|Applebot)") {
        set $is_crawler 1;
    }

    # Serve static assets with long cache headers
    location /assets/ {
        try_files $uri =404;
        access_log off;
        expires 1y;
        add_header Cache-Control "public";
    }

    # Proxy API requests to the backend service (versioned)
    location ^~ /api/v1/ {
        proxy_pass http://suba-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # Redirect legacy /api/* to /api/v1/*
    location = /api {
        return 308 /api/v1;
    }

    location ~ ^/api/(.*)$ {
        return 308 /api/v1/$1$is_args$args;
    }

    # Proxy uploads through the API container
    location ^~ /uploads/ {
        proxy_pass http://suba-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # SSR endpoint for crawlers (internal)
    location ^~ /_ssr/ {
        internal;
        proxy_pass http://suba-api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
    }

    # Routes that need SSR for social media crawlers
    # Blog detail pages
    location ~ ^/blogs/[^/]+$ {
        if ($is_crawler = 1) {
            rewrite ^(.*)$ /_ssr$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    # Service detail pages
    location ~ ^/services/[^/]+$ {
        if ($is_crawler = 1) {
            rewrite ^(.*)$ /_ssr$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    # Project detail pages
    location ~ ^/projects/[^/]+$ {
        if ($is_crawler = 1) {
            rewrite ^(.*)$ /_ssr$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    # Career detail pages
    location ~ ^/careers/[^/]+$ {
        if ($is_crawler = 1) {
            rewrite ^(.*)$ /_ssr$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    # Static pages that need SSR
    location = / {
        if ($is_crawler = 1) {
            rewrite ^(.*)$ /_ssr$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /about {
        if ($is_crawler = 1) {
            rewrite ^(.*)$ /_ssr$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /contact {
        if ($is_crawler = 1) {
            rewrite ^(.*)$ /_ssr$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /schedule {
        if ($is_crawler = 1) {
            rewrite ^(.*)$ /_ssr$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /blogs {
        if ($is_crawler = 1) {
            rewrite ^(.*)$ /_ssr$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /services {
        if ($is_crawler = 1) {
            rewrite ^(.*)$ /_ssr$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /projects {
        if ($is_crawler = 1) {
            rewrite ^(.*)$ /_ssr$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    location = /careers {
        if ($is_crawler = 1) {
            rewrite ^(.*)$ /_ssr$1 last;
        }
        try_files $uri $uri/ /index.html;
    }

    # Fallback to index.html for SPA routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Basic health endpoint for container checks
    location = /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
